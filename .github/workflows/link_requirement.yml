name: Link Requirement Issue

on:
  issues:
    types: [opened, edited]

permissions:
  contents: read
  issues: write
  repository-projects: write

jobs:
  link-requirement:
    # Only run for Issue Type = Feature
    if: >
      github.event.issue.type == 'Feature' ||
      github.event.issue.type.name == 'Feature'

    runs-on: ubuntu-latest

    env:
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      ISSUE_BODY: ${{ github.event.issue.body }}
      DEFAULT_REQUIREMENTS_REPO: ${{ vars.DEFAULT_REQUIREMENTS_REPO || 'dmf-mxl/mxl-requirements' }}

    steps:
      ###########################################################################
      # 0) TOKEN (your choice: PAT or GitHub App)
      ###########################################################################
      # Option A: PAT (simple for sandbox)
      - name: Export GH_TOKEN
        run: echo "GH_TOKEN=${{ secrets.CROSS_OWNER_LINKING_PAT }}" >> "$GITHUB_ENV"

      # Option B: GitHub App (uncomment this in main repo)
      # - uses: actions/create-github-app-token@v2
      #   id: app
      #   with:
      #     app-id: ${{ vars.CROSS_REPO_ISSUE_ACCESS_APP_ID }}
      #     private-key: ${{ secrets.CROSS_REPO_ISSUE_ACCESS_PRIVATE_KEY }}
      #     owner: dmf-mxl
      # - run: echo "GH_TOKEN=${{ steps.app.outputs.token }}" >> "$GITHUB_ENV"

      ###########################################################################
      # 1) Extract requirement_link from hidden HTML comment
      ###########################################################################
      - name: Extract requirement_link
        id: extract_raw
        run: |
          # Extract line like: <!-- mxl:requirement_link=VALUE -->
          REQ=$(printf "%s\n" "$ISSUE_BODY" \
            | sed -n 's/.*<!-- mxl:requirement_link=\(.*\) -->.*/\1/p')

          echo "requirement_link=$REQ" >> "$GITHUB_OUTPUT"
          echo "Extracted: $REQ"

      - name: Guard requirement_link
        id: guard
        run: |
          if [ -z "${{ steps.extract_raw.outputs.requirement_link }}" ]; then
            echo "Requirement link missing — skipping workflow"
            echo "has=false" >> "$GITHUB_OUTPUT"
          else
            echo "has=true" >> "$GITHUB_OUTPUT"
          fi

      ###########################################################################
      # 2) NORMALIZE requirement_link
      ###########################################################################
      - name: Normalize requirement link
        if: ${{ steps.guard.outputs.has == 'true' }}
        id: normalize
        env:
          RAW_LINK: ${{ steps.extract_raw.outputs.requirement_link }}
          DEFAULT: ${{ env.DEFAULT_REQUIREMENTS_REPO }}
        run: |
          LINK=$(echo "$RAW_LINK" | xargs)
          OWNER_REPO=""
          ISSUE_NUM=""

          if [[ "$LINK" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+#[0-9]+$ ]]; then
            OWNER_REPO="${LINK%%#*}"
            ISSUE_NUM="${LINK##*#}"
          elif [[ "$LINK" =~ ^\#?[0-9]+$ ]]; then
            OWNER_REPO="$DEFAULT"
            ISSUE_NUM="${LINK#\#}"
          elif [[ "$LINK" =~ ^https?://github\.com/([^/]+)/([^/]+)/issues/([0-9]+)$ ]]; then
            OWNER_REPO="${BASH_REMATCH[1]}/${BASH_REMATCH[2]}"
            ISSUE_NUM="${BASH_REMATCH[3]}"
          else
            echo "ERROR: Cannot parse '$LINK'"
            exit 1
          fi

          REQUIRE_URL="https://github.com/${OWNER_REPO}/issues/${ISSUE_NUM}"

          echo "owner_repo=$OWNER_REPO"      >> "$GITHUB_OUTPUT"
          echo "issue_num=$ISSUE_NUM"       >> "$GITHUB_OUTPUT"
          echo "requirement_url=$REQUIRE_URL" >> "$GITHUB_OUTPUT"

      ###########################################################################
      # 3) Create parent → child sub‑issue link
      ###########################################################################
      - name: Link as sub-issue
        if: ${{ steps.normalize.outputs.issue_num != '' }}
        env:
          PARENT_REPO: ${{ steps.normalize.outputs.owner_repo }}
          PARENT_NUMBER: ${{ steps.normalize.outputs.issue_num }}
          CHILD_REPO: ${{ github.repository }}
          CHILD_NUMBER: ${{ env.ISSUE_NUMBER }}
        run: |
          set -euo pipefail

          PARENT_NODE=$(gh issue view "$PARENT_REPO#$PARENT_NUMBER" --json id --jq .id)
          CHILD_NODE=$(gh issue view "$CHILD_REPO#$CHILD_NUMBER" --json id --jq .id)

          gh api graphql \
            -H "GraphQL-Features: sub_issues" \
            -f query="
              mutation {
                addSubIssue(input: {
                  issueId: \"${PARENT_NODE}\",
                  subIssueId: \"${CHILD_NODE}\"
                }) {
                  issue { title }
                  subIssue { title }
                }
              }
            "

      ###########################################################################
      # 4) Append clickable requirement URL to end of issue body
      ###########################################################################
      - name: Append requirement URL to issue body
        if: ${{ steps.normalize.outputs.issue_num != '' }}
        env:
          REQUIRE_URL: ${{ steps.normalize.outputs.requirement_url }}
          CHILD_REPO: ${{ github.repository }}
          CHILD_NUMBER: ${{ env.ISSUE_NUMBER }}
        run: |
          set -euo pipefail

          gh api "repos/$CHILD_REPO/issues/$CHILD_NUMBER" --jq .body > body_current.txt

          # Clear old marker
          sed -e '/<!--mxl:requirement:start-->/,/<!--mxl:requirement:end-->/d' \
            body_current.txt > body_clean.txt

          printf "\n\n<!--mxl:requirement:start-->\n%s\n<!--mxl:requirement:end-->\n" \
            "$REQUIRE_URL" >> body_clean.txt

          NEW_BODY=$(cat body_clean.txt)

          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "repos/$CHILD_REPO/issues/$CHILD_NUMBER" \
            -f body="$NEW_BODY"
